# Shared security headers — included at server-level and re-declared in any
# location that uses its own `add_header` (such directives reset inheritance).
# Editing CSP / HSTS / etc. — one file, no drift.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# script-src: no 'unsafe-inline' — Vite production build emits only external
#   <script type="module" src="..."> (verified against web/static-v2/index.html).
#   Telegram Login Widget loads from https://telegram.org as an external script.
# style-src 'unsafe-inline': Recharts injects inline SVG `style=` attributes;
#   nonce-ing those is impractical, so this stays as an explicit tradeoff.
# object-src 'none': defence-in-depth — no <object>/<embed> usage in the app.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-src https://oauth.telegram.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
